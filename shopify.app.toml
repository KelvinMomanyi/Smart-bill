# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "619efa429740598f93a2ef8f8d711cca"
name = "SmartBill"
handle = "smartbill-1"
application_url = "https://kinda-stronger-research-images.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "creatorsstore254.myshopify.com"
include_config_on_deploy = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_products,write_inventory,read_inventory,read_orders,write_orders"

[auth]
redirect_urls = [
  "https://kinda-stronger-research-images.trycloudflare.com/auth/callback",
  "https://kinda-stronger-research-images.trycloudflare.com/auth/shopify/callback",
  "https://kinda-stronger-research-images.trycloudflare.com/api/auth/callback"
]

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[pos]
embedded = false
